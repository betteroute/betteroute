name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate feature requests — they help shape the roadmap. Please describe what you need and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's frustrating or missing today?
      placeholder: I need to ... but currently there's no way to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be as specific or high-level as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or considered other approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is this related to?
      options:
        - API (backend)
        - Dashboard (frontend)
        - Redirect engine
        - Deep linking
        - Self-hosting / deployment
        - Other
    validations:
      required: true
