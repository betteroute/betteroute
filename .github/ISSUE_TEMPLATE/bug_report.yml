name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - Self-hosted
        - Cloud (managed)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      description: Run `git rev-parse --short HEAD` if self-hosted.
      placeholder: abc1234

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, or any relevant version info.
      placeholder: macOS 15, Chrome 130

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Error messages, stack traces, or screenshots.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - API (backend)
        - Dashboard (frontend)
        - Redirect engine
        - Deep linking
        - Analytics
        - Self-hosting / deployment
        - Other
    validations:
      required: true
