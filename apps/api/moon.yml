$schema: "../../.moon/cache/schemas/project.json"

language: go
stack: backend

project:
  name: "api"
  description: "Betteroute API server"

fileGroups:
  sources:
    - "cmd/**/*"
    - "internal/**/*"
    - "go.mod"
    - "go.sum"
  schema:
    - "sql/schema/**/*.sql"
  queries:
    - "sql/queries/**/*.sql"
  tests:
    - "internal/**/*_test.go"

tasks:
  # Development
  dev:
    command: "air"
    options:
      cache: false
      persistent: true
      envFile: true

  # Build
  build:
    script: "go build -ldflags \"-X ${LDFLAGS_VERSION}\" -o bin/betteroute ./cmd/betteroute"
    inputs:
      - "@group(sources)"
    outputs:
      - "bin/betteroute"
    env:
      LDFLAGS_VERSION: "github.com/execrc/betteroute/internal/config.Version=${VERSION:-dev}"

  # Testing
  test:
    command: "go test -race -cover ./..."
    inputs:
      - "@group(sources)"
      - "@group(tests)"

  # Linting
  lint:
    command: "go tool golangci-lint run"
    inputs:
      - "@group(sources)"

  check:
    deps:
      - "lint"
      - "test"

  tidy:
    command: "go mod tidy"
    options:
      cache: false

  # Code Generation
  sqlc:
    command: "go tool sqlc generate -f sql/sqlc.yaml"
    options:
      cache: false
    inputs:
      - "@group(schema)"
      - "@group(queries)"
      - "sql/sqlc.yaml"

  docs:
    command: "go tool swag init -d . -g cmd/betteroute/main.go -o internal/openapi --parseInternal --outputTypes go"
    inputs:
      - "@group(sources)"
    outputs:
      - "internal/openapi/docs.go"

  # Database
  db-migrate:
    script: "cd sql && atlas migrate diff --env dev"
    preset: "utility" # Disables caching, enables interactive mode, and streams output.
    options:
      envFile: true
    inputs:
      - "@group(schema)"
      - "sql/atlas.hcl"

  db-push:
    script: "cd sql && atlas migrate apply --env dev"
    preset: "utility"
    options:
      envFile: true

  db-status:
    script: "cd sql && atlas migrate status --env dev"
    preset: "utility"
    options:
      envFile: true

  db-seed:
    script: "for f in sql/seeds/*.sql; do psql ${DATABASE_URL} -f \"$f\"; done"
    preset: "utility"
    options:
      envFile: true
