$schema: "../../.moon/cache/schemas/project.json"

language: go
stack: backend

project:
  name: "api"
  description: "Betteroute API server"

fileGroups:
  sources:
    - "cmd/**/*"
    - "internal/**/*"
    - "go.mod"
    - "go.sum"
  schema:
    - "sql/schema/**/*.sql"
  queries:
    - "sql/queries/**/*.sql"
  tests:
    - "internal/**/*_test.go"

tasks:
  # Development
  dev:
    command: "air"
    options:
      cache: false
      persistent: true

  # Build
  build:
    script: "go build -ldflags \"-X ${LDFLAGS_VERSION}\" -o bin/api ./cmd/api"
    inputs:
      - "@group(sources)"
    outputs:
      - "bin/api"
    env:
      LDFLAGS_VERSION: "github.com/execrc/betteroute/internal/config.Version=${VERSION:-dev}"

  # Testing
  test:
    command: "go test -race -cover ./..."
    inputs:
      - "@group(sources)"
      - "@group(tests)"

  # Linting
  lint:
    command: "go tool golangci-lint run"
    inputs:
      - "@group(sources)"

  # Docs
  docs:
    command: "go tool swag init -g cmd/api/main.go -o internal/openapi --outputTypes json"
    inputs:
      - "@group(sources)"
    outputs:
      - "internal/openapi/swagger.json"

  # SQL code generation
  sqlc:
    command: "go tool sqlc generate"
    options:
      cache: false
    inputs:
      - "@group(schema)"
      - "@group(queries)"
      - "sql/sqlc.yaml"

  # Database
  db-diff:
    command: "atlas migrate diff --env dev"
    inputs:
      - "@group(schema)"
      - "sql/atlas.hcl"
    options:
      cache: false

  db-apply:
    command: "atlas migrate apply --env dev"
    options:
      cache: false

  db-status:
    command: "atlas migrate status --env dev"
    options:
      cache: false

  db-hash:
    command: "atlas migrate hash --env dev"
    inputs:
      - "sql/migrations/*"
    options:
      cache: false

  db-seed:
    script: "for f in sql/seeds/*.sql; do psql ${DATABASE_URL} -f \"$f\"; done"
    options:
      cache: false

  check:
    deps:
      - "lint"
      - "test"

  tidy:
    command: "go mod tidy"
    options:
      cache: false

