host: localhost:8080
info:
  contact: {}
  description: Open-source link management platform.
  title: Betteroute API
  version: 0.1.0
paths:
  /{code}:
    get:
      description: Resolves a short code and redirects to the destination URL.
      parameters:
      - description: Short code
        in: path
        name: code
        required: true
        type: string
      responses:
        "302":
          description: Redirect to destination
        "404":
          description: Link not found, inactive, or expired
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Redirect short link
      tags:
      - redirect
  /api/v1/folders:
    get:
      description: Returns all folders for a workspace, ordered by position.
      parameters:
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_folder.Folder'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: List folders
      tags:
      - folders
    post:
      consumes:
      - application/json
      description: Creates a new folder in the workspace.
      parameters:
      - description: Folder input
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_folder.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_folder.Folder'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "409":
          description: Folder name already exists
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Create folder
      tags:
      - folders
  /api/v1/folders/{id}:
    delete:
      description: Soft-deletes a folder. Links in the folder become unfiled.
      parameters:
      - description: Folder ID
        in: path
        name: id
        required: true
        type: string
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Delete folder
      tags:
      - folders
    get:
      description: Returns a single folder by ID within a workspace.
      parameters:
      - description: Folder ID
        in: path
        name: id
        required: true
        type: string
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_folder.Folder'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Get folder
      tags:
      - folders
    patch:
      consumes:
      - application/json
      description: Partially updates a folder. Only provided fields are changed.
      parameters:
      - description: Folder ID
        in: path
        name: id
        required: true
        type: string
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_folder.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_folder.Folder'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "409":
          description: Folder name already exists
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Update folder
      tags:
      - folders
  /api/v1/links:
    get:
      consumes:
      - application/json
      description: Returns a paginated list of links for a workspace.
      parameters:
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of links
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: List links
      tags:
      - links
    post:
      consumes:
      - application/json
      description: Creates a new short link in the workspace.
      parameters:
      - description: Link input
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_link.CreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_link.Link'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "409":
          description: Short code already in use
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Create link
      tags:
      - links
  /api/v1/links/{id}:
    delete:
      description: Soft-deletes a link. The link is not permanently removed.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Delete link
      tags:
      - links
    get:
      description: Returns a single link by ID within a workspace.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_link.Link'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Get link
      tags:
      - links
    patch:
      consumes:
      - application/json
      description: Partially updates a link. Only provided fields are changed.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_link.UpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_link.Link'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Update link
      tags:
      - links
  /api/v1/links/{id}/tags:
    get:
      description: Returns all tags associated with a link.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_tag.Tag'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: List tags for link
      tags:
      - tags
    post:
      consumes:
      - application/json
      description: Associates a tag with a link. Idempotent — no error if already
        associated.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      - description: Tag to associate
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_tag.AddToLinkInput'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "422":
          description: Validation failed
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Add tag to link
      tags:
      - tags
  /api/v1/links/{id}/tags/{tag_id}:
    delete:
      description: Removes a tag association from a link.
      parameters:
      - description: Link ID
        in: path
        name: id
        required: true
        type: string
      - description: Tag ID
        in: path
        name: tag_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: Remove tag from link
      tags:
      - tags
  /api/v1/tags:
    get:
      description: Returns all tags for a workspace, ordered by name.
      parameters:
      - description: Workspace ID
        in: query
        name: workspace_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_tag.Tag'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_execrc_betteroute_internal_errs.Error'
      summary: List tags
      tags:
      - tags
    post:
      consumes:
