<!DOCTYPE html>
<html>

<body style="font-family:sans-serif;max-width:560px;margin:40px auto;color:#111">
    <h2>Log in to Betteroute</h2>
    <p>Hi {{.Name}},</p>
    <p>Click the button below to securely sign into your account. This magic link expires in 15 minutes.</p>
    <p>
        <a href="{{.URL}}"
            style="display:inline-block;padding:10px 20px;background:#000;color:#fff;border-radius:5px;text-decoration:none;font-weight:500">
            Sign in
        </a>
    </p>
    <p style="color:#666;font-size:13px">If you didn't request this email, you can safely ignore it.</p>
</body>

</html>
