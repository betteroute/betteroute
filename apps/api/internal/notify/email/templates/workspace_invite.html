<!DOCTYPE html>
<html>

<body style="font-family:sans-serif;max-width:560px;margin:40px auto;color:#111">
  <h2>You've been invited</h2>
  <p>Hi there,</p>
  <p><strong>{{.InviterName}}</strong> has invited you to join <strong>{{.WorkspaceName}}</strong> on Betteroute.</p>
  <p>
    <a href="{{.URL}}"
      style="display:inline-block;padding:10px 20px;background:#000;color:#fff;border-radius:5px;text-decoration:none;font-weight:500">
      Accept invitation
    </a>
  </p>
  <p style="color:#666;font-size:13px">This invitation expires in 7 days. If you weren't expecting this, you can safely ignore it.</p>
</body>

</html>
