<!DOCTYPE html>
<html>

<body style="font-family:sans-serif;max-width:560px;margin:40px auto;color:#111">
  <h2>Verify your email</h2>
  <p>Hi {{.Name}},</p>
  <p>Click the button below to verify your email address. This link expires in 24 hours.</p>
  <p>
    <a href="{{.URL}}"
      style="display:inline-block;padding:10px 20px;background:#000;color:#fff;border-radius:5px;text-decoration:none;font-weight:500">
      Verify email
    </a>
  </p>
  <p style="color:#666;font-size:13px">If you didn't create a Betteroute account, you can safely ignore this email.</p>
</body>

</html>
