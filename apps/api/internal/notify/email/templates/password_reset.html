<!DOCTYPE html>
<html>

<body style="font-family:sans-serif;max-width:560px;margin:40px auto;color:#111">
  <h2>Reset your password</h2>
  <p>Hi {{.Name}},</p>
  <p>Click the button below to reset your password. This link expires in 1 hour.</p>
  <p>
    <a href="{{.URL}}"
      style="display:inline-block;padding:10px 20px;background:#000;color:#fff;border-radius:5px;text-decoration:none;font-weight:500">
      Reset password
    </a>
  </p>
  <p style="color:#666;font-size:13px">If you didn't request a password reset, you can safely ignore this email.</p>
</body>

</html>
